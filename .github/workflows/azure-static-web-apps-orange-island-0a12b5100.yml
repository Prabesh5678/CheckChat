name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env
        working-directory: frontend
        run: |
          cat > .env << EOF
          API_URL=${{ secrets.API_URL }}
          WS_URL=${{ secrets.WS_URL }}
          STUN_URL=${{ secrets.STUN_URL }}
          TURN_URL=${{ secrets.TURN_URL }}
          TURN_USERNAME=${{ secrets.TURN_USERNAME }}
          TURN_PASSWORD=${{ secrets.TURN_PASSWORD }}
          EOF

      - name: Flutter Pub Get
        working-directory: frontend
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: frontend
        run: flutter build web --release

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_ISLAND_0A12B5100 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          output_location: "frontend/build/web"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_ISLAND_0A12B5100 }}
          action: close