# Same port the Node/Django versions ran on
server.port=${PORT:8080}

# ── Payment gateway config (same env var names as the Node .env / Django .env) ──
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080}

app.esewa.product-code=${ESEWA_PRODUCT_CODE:EPAYTEST}
app.esewa.secret-key=${ESEWA_SECRET_KEY:}
app.esewa.form-url=${ESEWA_FORM_URL:https://rc-epay.esewa.com.np/api/epay/main/v2/form}
app.esewa.status-url=${ESEWA_STATUS_URL:https://rc.esewa.com.np/api/epay/transaction/status/}

app.khalti.secret-key=${KHALTI_SECRET_KEY:}
app.khalti.base-url=${KHALTI_BASE_URL:https://dev.khalti.com/api/v2}

# Keep logging to a single line per request — do NOT add a second logging
# handler/appender on top of this. (The Django port hit exactly that bug:
# an extra handler caused every log line to print twice.)
logging.level.root=INFO
