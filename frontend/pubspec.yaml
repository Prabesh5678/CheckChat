name: flutter_chess
description: Real-time multiplayer chess game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3
  chess: ^0.8.1          # dart port of chess.js — move validation, legal moves, game state
  cupertino_icons: ^1.0.6
  flutter_webrtc: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true